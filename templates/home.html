<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predict FWI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
        margin: 0;
        padding: 0;
        text-align: center;
        box-sizing: border-box;
      }

      /* Title styling */
      h1 {
        margin-top: 10px;
        color: #59385a;
        font-weight: 600;
        letter-spacing: 1px;
      }

      /* Form container */
      .form-container {
        background: #ffffffcc;
        padding: 15px;
        margin: 20px auto;
        width: 700px;
        border-radius: 10%;
        border: 5px solid rgba(90, 90, 90, 0.41);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
      }

      /* Inputs */
      input {
        width: 90%;
        padding: 10px;
        margin: 6px 0;
        border-radius: 12px;
        border: 1px solid #bc97e0;
        outline: none;
        background: #f9e7fa;
        transition: 0.3s ease;
        font-size: 14px;
      }

      input:focus {
        border-color: #66467889;
        background: #faddff;
        box-shadow: 0 0 5px #8a769c;
      }

      /* Button */
      .btn {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 15px;
        background: linear-gradient(135deg, #cdb4db, #ffc8dd);
        color: #4a4a4a;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(205, 180, 219, 0.4);
      }

      /* Result text */
      h3 {
        margin-top: 20px;
        color: #6d597a;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <h1>FWI PREDICTION</h1>
    <div class="form-container">
      <form action="{{url_for('predict_datapoint')}}" method="post">
        <input
          type="text"
          name="Temperature"
          placeholder="Temperature"
          required="required"
        /><br />
        <input
          type="text"
          name="RH"
          placeholder="RH"
          required="required"
        /><br />
        <input
          type="text"
          name="Ws"
          placeholder="Ws"
          required="required"
        /><br />
        <input
          type="text"
          name="Rain"
          placeholder="Rain"
          required="required"
        /><br />
        <input
          type="text"
          name="FFMC"
          placeholder="FFMC"
          required="required"
        /><br />
        <input
          type="text"
          name="DMC"
          placeholder="DMC"
          required="required"
        /><br />
        <input
          type="text"
          name="ISI"
          placeholder="ISI"
          required="required"
        /><br />
        <input
          type="text"
          name="Classes"
          placeholder="Classes"
          required="required"
        /><br />
        <input
          type="text"
          name="Region"
          placeholder="Region"
          required="required"
        /><br />
        <button type="submit" class="btn">Predict</button>
      </form>
      <h3>The Result is {{results}}</h3>
    </div>
  </body>
</html>
